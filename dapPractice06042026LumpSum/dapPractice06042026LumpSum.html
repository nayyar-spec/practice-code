<template>

    <div class="slds-grid">
        <lightning-button label="SIP" onclick={handleSip} variant="brand" class="sip-button"></lightning-button>
        <lightning-button label="Lumpsum" onclick={handleLumpsum} class="lumpsum-button"></lightning-button>
    </div>
    <div lwc:if={isSip}>
        <lightning-slider label="Monthly investment" min="500" max="1000000" value={investment} onchange={handleInvestment}></lightning-slider>
        <lightning-slider label="Expected return rate(p.a)" min="1" max="30" value={returnRate} onchange={handleReturnRate} step="0.1"></lightning-slider>
        <lightning-slider label="Time period" min="1" max="40" value={timePeriod} onchange={handleTimePeriod}></lightning-slider>
    </div>
    <div lwc:else>
        <lightning-slider label="Total investment" min="500" max="1000000" value={investment} onchange={handleInvestment}></lightning-slider>
        <lightning-slider label="Expected return rate(p.a)" min="1" max="30" value={returnRate} onchange={handleReturnRate} step="0.1"></lightning-slider>
        <lightning-slider label="Time period" min="1" max="40" value={timePeriod} onchange={handleTimePeriod}></lightning-slider>
    </div>
    
    <div>Invested Amount:  {investment}</div>
    <div>est. Returns:  {estReturns}</div>
    <div>Total Value:  {totalValue}</div>
</template>
