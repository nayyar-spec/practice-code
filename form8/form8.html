<template>
    <lightning-card title="Order Placement Component">
        <div class="slds-p-around_medium">
            <lightning-input class="name" label="Customer Name" placeholder="Enter customer name" required></lightning-input>
            <lightning-combobox
                class="item" 
                label="Select Item" 
                placeholder="Select an Option" 
                options={options}
                value={selectedOption}
                required>
            </lightning-combobox>
            <lightning-input class="quantity" label="Order Quantity" placeholder="Enter Quantity" required></lightning-input>
            <lightning-button onclick={handleClick} variant="brand" label="Place Order"></lightning-button>
        </div>
    </lightning-card>
</template>
