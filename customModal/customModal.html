<template>
    <lightning-card title="Custom Popup Demo (Topic #7)" icon-name="standard:answer_public">
        
        <div class="slds-p-around_medium">
            <lightning-button 
                label="Open Custom Popup" 
                variant="brand" 
                onclick={openModal}>
            </lightning-button>
        </div>

        <template if:true={isModalOpen}>
            
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                            X
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium">Dhyan Se Padhein!</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <p>Dosto, ye ek **Custom Modal** hai. Isme aap LDS form ki jagah kuch bhi daal sakte ho:</p>
                        <ul>
                            <li>Koi image</li>
                            <li>Koi lamba message</li>
                            <li>Ya koi naya component</li>
                        </ul>
                    </div>

                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={closeModal}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleSumbit}>Theek Hai</button>
                    </footer>

                </div>
            </section>

            <div class="slds-backdrop slds-backdrop_open"></div>

        </template> </lightning-card>
</template>

<!-- 
Detailed Explanation (Future ke liye save karein)
A. template if:true ka asli kaam:
JavaScript mein hum sirf ek switch (true/false) dabate hain. HTML ka ye tag us switch ko "Sunte" (Listen) hi poore Modal ki coding ko screen par la deta hai ya hata deta hai. Ise DOM manipulation kehte hain.

B. slds-modal__container kyu zaruri hai?
Ye wo dabba hai jo popup ki "Ch चौड़ाई" (width) aur "O ऊँचाई" (height) fix karta hai. Agar aap ye class hata doge, toh popup poori screen par phail jayega jo dekhne mein bura lagega.

C. Backdrop ka magic:
slds-backdrop_open sirf ek CSS class hai. Ye screen par ek invisible ya semi-transparent parda daal deti hai taaki user ka dhyan sirf popup par rahe aur wo piche ke buttons click na kar sake. -->
