<template>
    <lightning-card>
        <div class="slds-p-around_medium slds-grid slds-grid_horizontal">
            <lightning-button
                label="Accounts"
                variant="brand"
                data-id="Account"
                class="slds-m-bottom_small"
                onclick={handleClick}>
            </lightning-button>
            <lightning-button
                label="Contacts"
                variant="success"
                data-id="Contact"
                class="slds-m-bottom_small"
                onclick={handleClick}>
            </lightning-button>
            <lightning-button
                label="Opportunities"
                variant="neutral"
                data-id="Opportunity"
                class="slds-m-bottom_small"
                onclick={handleClick}>
            </lightning-button>
            <lightning-button
                label="Leads"
                variant="destructive"
                data-id="Lead"
                class="slds-m-bottom_small"
                onclick={handleClick}>
            </lightning-button>
        </div>
        <template if:true={modalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">Are You Sure ?</header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-button label="Cancel" variant="neutral" onclick={closeModal}></lightning-button>
                        <lightning-button label="Proceed" variant="brand" onclick={createRecord}></lightning-button>
                    </div>
                </div>
            </section>
        </template>
    </lightning-card>
</template>
