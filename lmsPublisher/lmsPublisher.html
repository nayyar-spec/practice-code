<template>
    <lightning-card title="LMS Publisher (Sender)" icon-name="standard:post">
        <div class="slds-p-around_medium">
            <lightning-input 
                label="Type message here" 
                onchange={handleInputChange}>
            </lightning-input>

            <div class="slds-m-top_medium">
                <lightning-button 
                    label="Publish Message" 
                    variant="brand" 
                    onclick={publishMessage}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
