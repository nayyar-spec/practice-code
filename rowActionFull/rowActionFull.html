<template>
    <lightning-card title="Advanced Row Actions" icon-name="standard:account">
        
        <div class="slds-p-around_medium">
            <lightning-datatable
                key-field="Id"
                data={accounts}
                columns={columns}
                onrowaction={handleRowAction}
                hide-checkbox-column="true">
            </lightning-datatable>
        </div>

        <template if:true={isEditModalOpen}>
            
            <section role="dialog" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Edit Kar Rahe Hain</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-record-edit-form 
                            record-id={currentRecordId} 
                            object-api-name="Account"
                            onsuccess={handleEditSuccess}>
                            
                            <lightning-input-field field-name="Name"></lightning-input-field>
                            <lightning-input-field field-name="Industry"></lightning-input-field>
                            
                            <div class="slds-m-top_medium">
                                <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                                <lightning-button type="submit" label="Save" variant="brand" class="slds-m-left_x-small"></lightning-button>
                            </div>
                        </lightning-record-edit-form>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </lightning-card>
</template>
<!-- 
Passing Information: Jab hum recordId={currentRecordId} likhte hain, hum data Send/Assign kar rahe hain.

Listening for Events: Jab hum onsuccess={...} likhte hain, hum Wait kar rahe hain ki kab Salesforce humein bataye ki kaam ho gaya.

Encapsulation: Aapne dekha? Humne koi "Update" query nahi likhi. Sirf type="submit" likha aur Salesforce ne poora data database mein sahi jagah Save kar diya. -->
