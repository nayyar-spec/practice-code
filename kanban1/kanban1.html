<template>
    <lightning-card title="kanban Board">
       <div class=" slds-grid slds-gutters slds-p-around_medium kanban-container" style="overflow-x: auto;">
            <template for:each={taskList} for:item="col">
                <div key={col.stage}
                    class="slds-col slds-size_1-of-4 drop-zone"
                    ondragover={handleDragOver} 
                    ondrop={handleDrop}
                    data-stage={col.stage}>
                    <h2 class="slds-text-heading_small slds-m-bottom_medium slds-text-align_center slds-box slds-theme_shade">
                        {col.stage}
                    </h2>
                    <div lwc:if={col.isToDo} class="slds-grid slds-wrap slds-m-bottom_small">
                        <lightning-button class="slds-col slds-size_1-of-2" label="Add Task" onclick={openModal}></lightning-button>
                        <lightning-button class="slds-col slds-size_1-of-2" label="Ready"></lightning-button>
                    </div>
                    <template for:each={col.tasks} for:item="task">
                        <div key={task}
                            class="slds-box slds-m-bottom_small slds-theme_default slds-grid card"
                            draggable="true"
                            ondragstart={handleDragStart}
                            data-task-id={task.id}
                            data-task-stage={col.stage}
                            data-task-name={task.name}>
                            <lightning-input 
                            type="checkbox"></lightning-input>
                            <p class="task-title">{task.name}</p>
                        </div>   
                    </template>
                </div>
            </template>
       </div>
       <template lwc:if={isModalOpen} >
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-model__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        X
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">Create Task</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input label="Name" value='' class="input-value"></lightning-input>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button class="slds-col slds-size_1-of-2" variant="neutral" onclick={closeModal} label="Cancel"></lightning-button>
                    <lightning-button class="slds-col slds-size_1-of-2" variant="brand" onclick={createTask} label="Add"></lightning-button>
                </footer>
            </div>
        </section>
        
    </template>
    </lightning-card>
    
</template>
