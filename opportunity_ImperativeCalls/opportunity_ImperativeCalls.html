<template>
    <div class="slds-grid slds-wrap slds-p-around_medium">
        <lightning-input class="searchinput slds-col slds-size_1-of-3" label="Search Opportunity" placeholder="Write Something..."></lightning-input>
        <lightning-button label="Search" class="slds-col slds-size_1-of-3" variant="brand" onclick={handleSearch}></lightning-button>
        <lightning-combobox 
            class="slds-col slds-size_1-of-3" 
            label="Select Status" 
            placeholder="Select Status" 
            options={statusOptions}
            value={selectedOption}
            onchange={updateStatus}>
        </lightning-combobox>
    </div>
    <lightning-card title="Opportunity List" icon-name="standard:opportunity">
        <div class="slds-p-around_medium">
            <lightning-datatable
                class="sldsdatatable"
                key-field="Id"
                data={filteredOpportunities}
                columns={columns}>
            </lightning-datatable>
        </div>
    </lightning-card>
</template>
